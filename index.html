<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ffe3e3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            max-width: 400px;
        }

        h1 { color: #ff4d6d; margin-bottom: 10px; }
        p { color: #555; line-height: 1.6; }

        .btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        .btn:hover { transform: scale(1.1); }

        #surprise { display: none; margin-top: 20px; }

        /* Floating Hearts Animation */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            user-select: none;
            animation: moveUp 4s linear infinite;
            opacity: 0;
        }

        @keyframes moveUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Birthday, SAYANGGGG! 🎂</h1>
        <p> <: I wanted to build something special just for you today :>.</p>
        <button class="btn" onclick="revealSurprise()">Click for your surprise</button>
        
        <div id="surprise">
            <p><strong>"You are the most amazing person I know. I'm so lucky to have you in my life. Let's make this year the best one yet!"</strong></p>
            <p>❤️ 💌 🥂</p>
        </div>
    </div>

    <script>
        function revealSurprise() {
            document.getElementById('surprise').style.display = 'block';
            document.querySelector('.btn').style.display = 'none';
            createHearts();
        }

        function createHearts() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    document.body.appendChild(heart);
                    
                    // Clean up hearts
                    setTimeout(() => heart.remove(), 5000);
                }, i * 200);
            }
        }
    </script>
</body>
</html>
