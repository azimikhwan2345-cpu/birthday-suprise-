<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday SAYANGGGGG! ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            z-index: 10;
            max-width: 90%;
            width: 450px;
            margin: 20px;
        }

        h1 { color: #ff4d6d; font-size: 2rem; margin-bottom: 10px; }
        .subtext { color: #880d1e; font-style: italic; margin-bottom: 20px; }

        .photo-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            display: none; /* Hidden until button click */
        }

        .photo-container img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid #ff4d6d;
        }

        /* Large feature photo */
        .photo-container img:first-child {
            grid-column: span 2;
            height: 300px;
        }

        .btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        .btn:hover { transform: translateY(-3px); background: #ff758f; }

        #surprise-msg { display: none; margin-top: 25px; color: #555; }

        .heart {
            position: fixed;
            top: -10%;
            color: #ff4d6d;
            font-size: 20px;
            user-select: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Birthday, SAYANGGGGG! 🎂</h1>
        <p class="subtext"><: I wanted to build something special just for you today :></p>
        
        <button class="btn" onclick="showSurprise()">Open Your Surprise ❤️</button>
        
        <div id="surprise-msg">
            <p><strong>"Every moment with you is a gift. Happy Birthday to the most beautiful girl!"</strong></p>
            
            <div class="photo-container" id="gallery">
                <img src="img1.jpg" alt="SAYANGGGGG">
                <img src="img2.jpg" alt="Memory">
                <img src="img3.jpg" alt="Memory">
                <img src="img4.jpg" alt="Memory">
                <img src="img5.jpg" alt="Memory">
                <img src="img6.jpg" alt="Memory">
                <img src="img7.jpg" alt="Memory">
                <img src="img8.jpg" alt="Memory">
            </div>
        </div>
    </div>

    <script>
        function showSurprise() {
            document.getElementById('surprise-msg').style.display = 'block';
            document.getElementById('gallery').style.display = 'grid';
            document.querySelector('.btn').style.display = 'none';
            startHearts();
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
